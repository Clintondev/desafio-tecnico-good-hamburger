<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Good Hamburger</title>
    <base href="/" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#b71d00',
                        secondary: '#805600',
                        tertiary: '#785451',
                        surface: '#fff8f7',
                        'on-surface': '#201a1a'
                    },
                    fontFamily: {
                        heading: ['"Plus Jakarta Sans"', 'sans-serif'],
                        body: ['"Work Sans"', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">
        <div style="text-align:center; padding:4rem; font-family:'Work Sans',sans-serif; color:#b71d00;">
            <h2>Carregando Good Hamburger...</h2>
        </div>
    </div>

    <div id="blazor-error-ui">
        Ocorreu um erro.
        <a href="" class="reload">Recarregar</a>
        <a class="dismiss">x</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
